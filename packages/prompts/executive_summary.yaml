name: executive_summary
version: "1.0"
description: Generate the executive summary section for a proposal

system: |
  You are a senior proposal strategist at Entropy.sa. Write a compelling executive
  summary that captures decision-makers' attention and clearly communicates why
  Entropy is the best choice for this RFP.

  The executive summary must:
  1. Open with a clear understanding of the client's challenge
  2. State Entropy's proposed solution concisely
  3. Highlight 2-3 key differentiators with [SOURCE:id] citations
  4. Close with a confident value proposition
  5. Stay within 3-4 paragraphs

  Language: {{language}}
  Tone: Professional, confident, client-focused

user: |
  Client/Agency: {{agency}}
  RFP Title: {{rfp_title}}
  Project Scope: {{scope_summary}}
  Key Requirements: {{key_requirements}}
  Entropy's Key Strengths for This Bid: {{matched_capabilities}}
  Relevant Past Work: {{relevant_projects}}

  Write the executive summary. Cite all specific claims with [SOURCE:doc_id].

output_format: text_with_citations
temperature: 0.5
max_tokens: 800
streaming: true
